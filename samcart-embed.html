<!-- ============================================================ -->
<!-- LIVING WORLDS — SAMCART EMBED SNIPPET                        -->
<!-- Paste into a SamCart Custom HTML widget.                     -->
<!-- Replace YOUR-VERCEL-APP with the deployed Vercel URL.        -->
<!-- This wrapper is intentionally minimal — the real experience  -->
<!-- (UI, design, gameplay) lives entirely in the Vercel app.     -->
<!-- ============================================================ -->

<div id="LivingWorldsEmbed">
  <div class="lwe-framebox">
    <iframe
      id="LivingWorldsFrame"
      src="https://YOUR-VERCEL-APP.vercel.app"
      width="100%"
      height="900"
      style="border:0;width:100%;min-height:900px;background:#050505;"
      allow="clipboard-write; fullscreen; microphone"
    ></iframe>
  </div>

  <div class="lwe-footer">
    <a
      class="lwe-fullscreen"
      href="https://YOUR-VERCEL-APP.vercel.app"
      target="_blank"
      rel="noopener"
    >
      Open Living Worlds in Full Screen
    </a>
  </div>
</div>

<style>
#LivingWorldsEmbed {
  width:100%;
  max-width:100%;
  margin:0 auto;
  background:#050505;
  color:#f5f0df;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 8px 60px rgba(0,0,0,0.7);
}

#LivingWorldsEmbed * {
  box-sizing:border-box;
}

#LivingWorldsEmbed .lwe-framebox {
  width:100%;
  background:#050505;
  border-radius:14px;
  overflow:hidden;
}

#LivingWorldsEmbed iframe {
  display:block;
  width:100%;
  min-height:900px;
  background:#050505;
}

#LivingWorldsEmbed .lwe-footer {
  display:flex;
  justify-content:center;
  padding:0.75rem 0 0.25rem;
  background:#050505;
}

#LivingWorldsEmbed .lwe-fullscreen {
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:9px 16px;
  border:1px solid rgba(201,168,76,0.35);
  border-radius:999px;
  color:#e8c97a;
  background:#111;
  text-decoration:none;
  font-size:12px;
  letter-spacing:0.08em;
  text-transform:uppercase;
}

#LivingWorldsEmbed .lwe-fullscreen:hover {
  color:#fff;
  border-color:#c9a84c;
}

@media(max-width:600px){
  #LivingWorldsEmbed iframe {
    min-height:760px;
  }
}
</style>

<script>
(function(){
  var frame = document.getElementById('LivingWorldsFrame');
  if(!frame) return;

  window.addEventListener('message', function(event){
    if(!event || !event.data) return;

    var data = event.data;

    if(data.type === 'livingworlds:height' && data.height){
      var nextHeight = parseInt(data.height, 10);
      if(!isNaN(nextHeight) && nextHeight > 500){
        frame.style.height = nextHeight + 'px';
        frame.setAttribute('height', String(nextHeight));
      }
    }
  });
})();
</script>
